name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check app/

  test:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: "0000000000:AAFxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      DATABASE_URL: "sqlite+aiosqlite:///./test.db"
      GOOGLE_SHEETS_CREDENTIALS: "{}"
      AVITO_CLIENT_ID: "test"
      AVITO_CLIENT_SECRET: "test"
      AVITO_REDIRECT_URI: "http://localhost"
      TELEGRAM_CHAT_ID: "123456789"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest --cov=app --cov-report=xml tests/
      - uses: codecov/codecov-action@v3
        if: always()

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install bandit pip-audit
      - run: bandit -r app/ -lll
      - run: pip-audit

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t easycamp:${{ github.sha }} .
