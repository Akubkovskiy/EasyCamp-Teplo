# Add this location block to the teplo-v-arkhyze.ru server block in nginx
# (inside the ##domain server block, before the closing brace)
#
# This proxies /admin-web/* to the EasyCamp bot running on port 8000.
# No VPN risk — this only changes routing for teplo-v-arkhyze.ru domain,
# VPN services (kub.teplo-v-arkhyze.ru, WireGuard, V2Ray) are unaffected.
#
# To apply on FI:
#   1. Find live nginx config: docker exec <nginx_container> nginx -T 2>&1 | grep -n "teplo-v-arkhyze"
#   2. Or check /etc/nginx/conf.d/ or location.conf included by main config
#   3. Add the block below inside the teplo-v-arkhyze.ru server block
#   4. docker exec <nginx_container> nginx -t   (test config)
#   5. docker exec <nginx_container> nginx -s reload

location /admin-web {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}
